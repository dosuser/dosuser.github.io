# Site Configuration
title:              "dosuser's blog"
description:        "Personal blog about development, spring, and distributed storage"
url:                "https://dosuser.github.io"
baseurl:            ""
logo:               "/assets/images/logo.png"

# Author Information
author:
  name:             "SHIN DAE YONG"
  email:            dosuser@naver.com
  github:           dosuser
  instagram:        dosuser
  facebook:         daeyong.shin.96

# Copyright
copyright:
  year:             2026
  name:             "SHIN DAE YONG"

# Timezone
timezone:           "Asia/Seoul"

# Markdown
markdown:           kramdown
kramdown:
  input:            GFM
  syntax_highlighter: rouge

# Permalink Structure
permalink:          "/:year/:month/:title/"

# Pagination (GitHub Pages compatible)
paginate:           10
paginate_path:      "/page:num/"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Build Settings
sass:
  style:            compressed
  load_paths:
    - _sass

# Collections
collections:
  - posts

# Defaults
defaults:
  - scope:
      path:         ""
      type:         "pages"
    values:
      layout:       "page"
  - scope:
      path:         ""
      type:         "posts"
    values:
      layout:       "post"
      author:       "SHIN DAE YONG"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .sass-cache/
  - .jekyll-cache/
  - node_modules/
  - package.json
  - package-lock.json

# Include in processing
include:
  - _redirects
  - .htaccess
